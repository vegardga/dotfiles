# Mouse support - set to on if you want to use the mouse
set -g mouse on

# Set the default terminal mode to 256color mode
set -g default-terminal "tmux-256color"

# Override terminal so it displays 32bit RGB color
set -a terminal-overrides ",*256col*:RGB"

# Set the delay between prefix and command
set -sg escape-time 1

# Start windows and panes at 1, not 0
set -g base-index 1
set -w -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Add keybind for easily refreshing tmux configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Split panes with | and -
# bind | split-window -h
# bind - split-window -v

# Split pane and retain the current directory of existing pane
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c  "#{pane_current_path}"

# Switch to alternate session (last session)
bind - switch-client -l

# Move between panes with Prefix h,j,k,l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing panes with Prefix H,J,K,L
# Or use shift and the arrow keys (without prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -n S-Left  resize-pane -L 5
bind -n S-Down  resize-pane -D 5
bind -n S-Up  resize-pane -U 5
bind -n S-Right resize-pane -R 5

# Swap windows
bind -r Left swap-window -t -1 \; select-window -t -1
bind -r Right swap-window -t +1 \; select-window -t +1

# Quick window selection
# bind -r C-h select-window -t :-
# bind -r C-l select-window -t :+
# bind -n S-Left  previous-window
# bind -n S-Right next-window

# Move statusbar
set-option -g status-position bottom

# Set the status line's colors
set -g status-style bg=default,fg=black,bright

# Status line left side to show Session: [name] [window] [pane]
# set -g status-left ""
set -g status-left-length 40
set -g status-left "#[fg=white][#S] "

# Status line right side -  31-Oct 13:37
# set -g status-right "#[fg=purple]#(~/battery Discharging) | #[fg=cyan]%d %b %R"
# set-option -g status-right '#[fg=white]#(date +"%H:%M") #[fg=white]#(whoami)'
# set-option -g status-right "#[fg=black,bright]#S"
set-option -g status-right ""

# Center the window list in the status line
# set -g status-justify centre

# Set the color of the window list
set -g window-status-style bg=default,fg=black

# Set colors for the active window
set -g window-status-current-style bg=default,fg=gray,bright

# Colors and styling for pane borders
# Pane border style: single, double, heavy, simple, number.
set -w -g pane-border-lines single
# Add indicators for two-pane setup
set -g pane-border-indicators arrows
# Add status to panes
set -g pane-border-status top
set -g pane-border-format "#{pane_index}"

# Foreground color of a pane is the actual dashed line that makes up the border
# Background color is by default black
set -w -g pane-border-style fg=black,bright,bg=default
set -w -g pane-active-border-style fg=default,bg=default

# Active pane normal, other shaded out (dim out any pane that is not active)
# color240 / color235 is lighter and darker grey
# set -g window-style fg=color240,bg=color235
# set -g window-active-style fg=white,bg=black

# Active pane normal, other shaded out
# set -g window-style fg=color240,bg=color235
# set -g window-active-style fg=white,bg=black

# Command / message line
# set -g message-style fg=white,bg=color242,bold

# Update the status line every sixty seconds
set -g status-interval 30

# Enable activity alerts
# set -w -g monitor-activity on
# set -w -g visual-activity on

# increase scrollback buffer size
set -g history-limit 50000

# messages are displayed for 4 seconds
set -g display-time 4000

# focus events enabled for terminals that support them
set -g focus-events on

# Enable copy/paste
set -s set-clipboard on

# Enable vi keys.
set -w -g mode-keys vi

# Escape turns on copy mode
# bind Escape copy-mode-vi

# Configure vim movements for tmux copy mode
bind Y copy-mode

# v in copy mode starts making selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection # copy text with "y"

# y in copy mode takes selection and sends it to system clipboard via pbcopy
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel # copy text with "y", and cancel/get back to terminal right away

# Make Prefix p paste the buffer.
# unbind p
# bind p paste-buffer

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# Initiate tmux-sessionizer - aka start a new tmux session from folder using fzf
bind-key "T" run-shell "tmux neww REPLACE_ME_WITH_TMUX_SESSIONIZER_PATH"

# Session jumping with fzf
bind-key S display-popup -E "REPLACE_ME_WITH_TMUX_SESSION_LIST_PATH"

# Shortcut for synchronize-panes toggle
bind C-s set-window-option synchronize-panes

# make session chooser order by name instead of session index
bind s choose-tree -sZ -O name

bind C-l send-keys 'C-l'

# Log output to a text file on demand
bind P pipe-pane -o "cat >>~/#W.log" \; display "Toggled logging to ~/#W.log"

# Load mac-specific settings
# if-shell "uname | grep -q Darwin" "source-file ~/.tmux.mac.conf"

# Prefix Ctrl-C takes what's in the buffer and sends it to system clipboard
# via pbcopy
bind C-c run "tmux save-buffer - | pbcopy"

# Prefix Ctrl-v fills tmux buffer from system clipboard via pbpaste, then
# pastes from buffer into tmux window
bind C-v run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

# Load private settings if they exist
if-shell "[ -f ~/.tmux.private]" "source ~/.tmux.private"

# F12 nested session toggle
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=default,bg=#2D4F67" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Show [OFF] indicator when keys are off
set -g status-right '#([ $(tmux show-option -qv key-table) = "off" ] && echo " [OFF] ")'

bind O display-popup -d "~/" \
                         -x C -y C -w 50% -h 50% \
                         -e "POPUP=true" -E "bash"
# popup menu
bind e  \
  display-menu -T "Quick Menu" -x C -y C \
    "New Window" n "new-window" \
    "Horizontal Split" - "split-window" \
    "Vertical Split"  | "split-window -h" \
    "Close Pane" x "kill-pane"

# Install tpm (tmux plugin manager)
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# Install plugins by typing Ctrl-B, followed by Shift-I

# Add and configure tmux plugins with tpm
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
# set -g @plugin 'jimeh/tmux-themepack' # to configure tmux theme
# set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
# set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

# set -g @themepack 'powerline/default/cyan' # use this theme for tmux

# set -g @resurrect-capture-pane-contents 'on' # allow tmux-resurrect to capture pane contents
# set -g @continuum-restore 'on' # enable tmux-continuum functionality

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'
run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'
