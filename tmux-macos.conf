# F12 nested session toggle
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=default,bg=#2D4F67" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Show [OFF] indicator when keys are off
set -g status-right '#([ $(tmux show-option -qv key-table) = "off" ] && echo " [OFF] ")'

